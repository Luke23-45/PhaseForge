# config/data/common.yaml — Shared data parameters

batch_size: 256
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 2

sequence_length: 1        # Single-step training; override to >1 for chunked
stride: 1                 # Stride between samples in index map

normalization_strategy: "zscore"   # zscore | minmax

# State keys to extract from LIBERO HDF5 (in concatenation order)
state_keys:
  - key: "robot0_joint_pos"
    dim: 7
  - key: "robot0_joint_vel"
    dim: 7
  - key: "robot0_eef_pos"
    dim: 3
  - key: "robot0_eef_quat"
    dim: 4
  - key: "robot0_gripper_qpos"
    dim: 2

action_key: "actions"
action_dim: 7

# Computed: sum of all dims above
state_dim: 23   # 7+7+3+4+2

# Cache root (relative to project output_dir or absolute)
cache_root: "cache"
