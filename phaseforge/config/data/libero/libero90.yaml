# config/data/libero/libero90.yaml — LIBERO-90 dataset config

# @package _global_
# Merges into the root config under data.libero

dataset_name: "libero90"
description: "LIBERO-90: 90 short-horizon tasks for pretraining and bootstrapping"

# The FSM resolves this suite folder under the env-var-aware data root
# ({data_root}/raw/libero/libero_90/) and applies the official 90-file
# integrity check. Download via:
#   python -m phaseforge.data.scripts.download_libero --suites libero_90
suite: "libero_90"

# role: "train"  -> this suite is the bootstrapping/pretraining source.
#                   The FSM carves a task-level train/val split from it.
# role: "eval"   -> this suite is downstream evaluation (LIBERO-LONG),
#                   exposed via DataPipelineStateMachine.get_eval_loader().
role: "train"

split:
  val_ratio: 0.1        # fraction of TASKS held out for validation
  seed: 42              # Matches project.seed by default

# Phase labeling config (nested here for cache-hash inclusion)
phase_labeler:
  _target_: phaseforge.data.libero.phase_labeler.RuleBasedPhaseLabeler
  num_phases: 6
  gripper_closed_threshold: 0.02
  gripper_open_threshold: 0.04
  eef_velocity_threshold: 0.01
  min_phase_duration: 5
  median_filter_size: 7
