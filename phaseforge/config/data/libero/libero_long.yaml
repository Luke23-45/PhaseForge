# config/data/libero/libero_long.yaml — LIBERO-LONG evaluation config

dataset_name: "libero_long"
description: "LIBERO-LONG: 10 long-horizon tasks for downstream evaluation only"

# Resolves to {data_root}/raw/libero/libero_10/ with the official 10-file
# integrity check. Download via:
#   python -m phaseforge.data.scripts.download_libero --suites libero_10
suite: "libero_10"

# role: "eval" -> all trajectories are held out; exposed via
#                 DataPipelineStateMachine.get_eval_loader(). The normalizer
#                 used here is the TRAIN-frozen one (never recomputed on eval).
role: "eval"

split:
  val_ratio: 0.0        # unused for eval role; kept for config-hash stability
  seed: 42

phase_labeler:
  _target_: phaseforge.data.libero.phase_labeler.RuleBasedPhaseLabeler
  num_phases: 6
  gripper_closed_threshold: 0.02
  gripper_open_threshold: 0.04
  eef_velocity_threshold: 0.01
  min_phase_duration: 5
  median_filter_size: 7
