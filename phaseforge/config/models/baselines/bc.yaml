# config/models/baselines/bc.yaml — Behavior Cloning baseline

name: "bc"
_target_: phaseforge.models.baselines.bc.BehaviorCloningModel

encoder:
  _target_: phaseforge.models.components.encoder.StateEncoder
  input_dim: 23
  hidden_dims: [256, 256, 256]
  latent_dim: 128
  activation: "gelu"
  dropout: 0.1
  use_residual: true

action_head:
  _target_: phaseforge.models.components.action_head.ActionHead
  input_dim: 128
  output_dim: 7
  head_type: "deterministic"
  hidden_dim: 256
