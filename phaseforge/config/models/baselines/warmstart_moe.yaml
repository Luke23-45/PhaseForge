# config/models/baselines/warmstart_moe.yaml — Warm-Start MoE (pretrained without phase loss)

_target_: phaseforge.models.baselines.warmstart_moe.WarmStartMoEModel

encoder:
  _target_: phaseforge.models.components.encoder.StateEncoder
  input_dim: 23
  hidden_dims: [256, 256, 256]
  latent_dim: 128
  activation: "gelu"
  dropout: 0.1
  use_residual: true

action_head:
  _target_: phaseforge.models.components.action_head.ActionHead
  input_dim: 128
  output_dim: 7
  head_type: "deterministic"
  hidden_dim: 256

router:
  _target_: phaseforge.models.components.router.TopKRouter
  latent_dim: 128
  num_experts: 6
  top_k: 2
  noise_std: 0.1
  balance_coeff: 0.01

expert:
  _target_: phaseforge.models.components.expert.ExpertMLP
  input_dim: 128
  hidden_dims: [256, 256]
  output_dim: 7
  activation: "gelu"
