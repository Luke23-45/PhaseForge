# config/train/stage1.yaml — Stage 1: Phase-supervised generalist pretraining

stage: 1
epochs: 100
grad_clip_norm: 1.0
lambda_phase: 1.0         # Weight on the auxiliary phase classification loss
log_every_n_steps: 50

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100              # Matches epochs
  eta_min: 1.0e-6

checkpoint:
  every_n_epochs: 10
  monitor: "val/loss_total"
  mode: "min"             # Save when val loss decreases
  save_top_k: 1

# Stage 2 does not apply here; this key is just defined for schema consistency
stage1_ckpt_path: null
freeze_encoder: false
balance_coeff: 0.0        # Not used in Stage 1
